<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoShop - Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f8f9fa;
            font-family:Arial, sans-serif;
        }

        .login-container{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-card{
            width:100%;
            max-width:450px;
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0 4px 15px rgba(0,0,0,0.1);
        }

        .brand{
            text-align:center;
            color:#198754;
            font-size:32px;
            font-weight:bold;
            margin-bottom:25px;
        }

        .btn-login{
            background:#198754;
            color:white;
        }

        .btn-login:hover{
            background:#157347;
            color:white;
        }
    </style>
</head>
<body>

<div class="container login-container">

    <div class="login-card">

        <div class="brand">EcoShop</div>

        <h3 class="text-center mb-4">Login</h3>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label>Email / Username</label>
                <input type="text"
                       name="username"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input type="password"
                       name="password"
                       class="form-control"
                       required>
            </div>

            <button type="submit"
                    class="btn btn-login w-100">
                Login
            </button>

        </form>

        <div class="text-center mt-3">
            Don't have an account?
            <a href="/register">Register</a>
        </div>

        <div class="text-center mt-2">
            <a href="/">Back to Home</a>
        </div>

    </div>

</div>

</body>
</html>
