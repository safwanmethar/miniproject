<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoShop - Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f8f9fa;
            font-family:Arial, sans-serif;
        }

        .register-container{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:40px 0;
        }

        .register-card{
            width:100%;
            max-width:550px;
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0 4px 15px rgba(0,0,0,0.1);
        }

        .brand{
            text-align:center;
            color:#198754;
            font-size:32px;
            font-weight:bold;
            margin-bottom:20px;
        }

        .btn-register{
            background:#198754;
            color:white;
        }

        .btn-register:hover{
            background:#157347;
            color:white;
        }
    </style>
</head>
<body>

<div class="container register-container">

    <div class="register-card">

        <div class="brand">EcoShop</div>

        <h3 class="text-center mb-4">Create Account</h3>

        <form method="POST">
            {% csrf_token %}

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label>First Name</label>
                    <input type="text"
                           name="first_name"
                           class="form-control"
                           required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Last Name</label>
                    <input type="text"
                           name="last_name"
                           class="form-control"
                           required>
                </div>

            </div>

            <div class="mb-3">
                <label>Username</label>
                <input type="text"
                       name="username"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input type="email"
                       name="email"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input type="password"
                       name="password"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label>Confirm Password</label>
                <input type="password"
                       name="confirm_password"
                       class="form-control"
                       required>
            </div>

            <button type="submit"
                    class="btn btn-register w-100">
                Register
            </button>

        </form>

        <div class="text-center mt-3">
            Already have an account?
            <a href="/login">Login</a>
        </div>

        <div class="text-center mt-2">
            <a href="/">Back to Home</a>
        </div>

    </div>

</div>

</body>
</html>
