{% extends 'admin/adminbase.html' %}

{% block title %}
Edit Brand
{% endblock %}

{% block content %}

<style>

    .form-wrapper{
        max-width:600px;
        margin:auto;
    }

    .form-card{
        background:white;
        border-radius:20px;
        padding:25px;
        box-shadow:0 10px 30px rgba(0,0,0,0.05);
        border:1px solid rgba(0,0,0,0.05);
    }

    .page-title{
        font-weight:800;
        margin-bottom:8px;
    }

    .subtitle{
        color:#6b7280;
        font-size:14px;
        margin-bottom:20px;
    }

    label{
        font-weight:600;
        color:#374151;
        margin-bottom:6px;
    }

    .form-control{
        border-radius:12px;
        padding:10px 14px;
        border:1px solid #e5e7eb;
        transition:0.2s;
    }

    .form-control:focus{
        border-color:#16a34a;
        box-shadow:0 0 0 3px rgba(22,163,74,0.15);
    }

    .btn-save{
        background:linear-gradient(135deg,#16a34a,#22c55e);
        border:none;
        padding:10px 18px;
        border-radius:12px;
        font-weight:600;
        color:white;
        transition:0.3s;
    }

    .btn-save:hover{
        transform:translateY(-2px);
        box-shadow:0 10px 20px rgba(34,197,94,0.25);
    }

    .edit-badge{
        display:inline-block;
        background:#fff7ed;
        color:#c2410c;
        padding:5px 10px;
        border-radius:999px;
        font-size:12px;
        font-weight:600;
        margin-bottom:10px;
    }

</style>

<div class="form-wrapper">

    <h2 class="page-title">✏️ Edit Brand</h2>
    <div class="subtitle">
        Update brand information
    </div>

    <div class="form-card">

        <div class="edit-badge">Editing Mode</div>

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">
                <label>Brand Name</label>
                <input type="text"
                       name="name"
                       value="{{ brand.name }}"
                       class="form-control"
                       required>
            </div>

            <div class="text-end">
                <button class="btn btn-save">
                    Update Brand
                </button>
            </div>

        </form>

    </div>

</div>

{% endblock %}
