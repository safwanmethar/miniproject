{% extends 'admin/adminbase.html' %}

{% block title %}
Categories
{% endblock %}

{% block content %}

<style>

    .page-header{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:20px;
        flex-wrap:wrap;
        gap:10px;
    }

    .page-header h2{
        font-weight:800;
        margin:0;
    }

    .add-btn{
        background:linear-gradient(135deg,#16a34a,#22c55e);
        color:white;
        padding:10px 16px;
        border-radius:12px;
        font-weight:600;
        text-decoration:none;
        transition:0.3s;
    }

    .add-btn:hover{
        transform:translateY(-2px);
        box-shadow:0 10px 20px rgba(34,197,94,0.25);
        color:white;
    }

    .table-card{
        background:white;
        border-radius:18px;
        padding:15px;
        box-shadow:0 10px 30px rgba(0,0,0,0.05);
    }

    .table{
        margin:0;
    }

    .table thead{
        background:#f9fafb;
    }

    .table th{
        font-size:13px;
        font-weight:800;
        text-transform:uppercase;
        letter-spacing:0.5px;
        border:none !important;
        color:#374151;
    }

    .table td{
        vertical-align:middle;
        border-color:#f1f5f9 !important;
        font-weight:500;
    }

    .table tbody tr{
        transition:0.2s;
    }

    .table tbody tr:hover{
        background:#f9fafb;
        transform:scale(1.01);
    }

    .btn-sm{
        border-radius:10px;
        padding:5px 10px;
        font-size:13px;
    }

    .btn-warning{
        background:#fbbf24;
        border:none;
        color:#111827;
    }

    .btn-danger{
        background:#ef4444;
        border:none;
    }

    .badge-cat{
        background:#ecfdf5;
        color:#16a34a;
        padding:5px 10px;
        border-radius:999px;
        font-size:12px;
        font-weight:600;
    }

    /* mobile */
    .table-responsive{
        overflow-x:auto;
    }

</style>

<div class="page-header">

    <h2>📂 Manage Categories</h2>

    <a href="/add-category" class="add-btn">
        + Add Category
    </a>

</div>

<div class="table-card">

    <div class="table-responsive">

        <table class="table align-middle">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Category Name</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>

                {% for category in categories %}

                <tr>

                    <td>#{{ category.id }}</td>

                    <td>
                        <span class="badge-cat">
                            {{ category.name }}
                        </span>
                    </td>

                    <td>

                        <a href="/edit-category/{{ category.id }}"
                           class="btn btn-warning btn-sm">
                            Edit
                        </a>

                        <a href="/delete-category/{{ category.id }}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Delete this category?')">
                            Delete
                        </a>

                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
